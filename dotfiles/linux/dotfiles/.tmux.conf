# ~/.tmux.conf — tmux configuration
# Built by clavexis — github.com/clavexis

# Use a more ergonomic prefix (Ctrl-a), keep Ctrl-b as fallback
set -g prefix C-a
bind C-a send-prefix

set -g mouse on                 # mouse support
set -g history-limit 10000      # scrollback
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1
setw -g mode-keys vi            # vi-style copy mode
set -sg escape-time 10          # faster key response
set -g renumber-windows on

# Split panes with | and - (and keep the current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- status bar -----------------------------------------------------------
set -g status-position bottom
set -g status-bg colour235
set -g status-fg colour250
set -g status-left "#[fg=colour46,bold] #S "
set -g status-right "#[fg=colour250] %Y-%m-%d #[fg=colour46]%H:%M "
set -g status-right-length 50
setw -g window-status-current-format "#[fg=colour46,bold] #I:#W "
setw -g window-status-format " #I:#W "
